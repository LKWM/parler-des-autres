<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leçon 12 - Conversation avec Seowon</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tone.js for Sound Effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* CSS Reset & Strict No-Scroll Constraints */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #f1f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }

        /* Full Screen Flex Container */
        #app-container {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #progress-container {
            flex-shrink: 0;
        }

        /* Pages Wrapper */
        #pages-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            display: flex;
            overflow: hidden;
        }

        .page {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.3s ease-out forwards;
        }
        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpBubble {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble-animate {
            animation: slideUpBubble 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            text-align: center;
            min-h: 0;
            overflow-y: auto;
        }

        /* Pulse Animation for Recording */
        .recording-pulse {
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        /* Chat UI Specific */
        .chat-area {
            flex: 1;
            width: 100%;
            max-width: 32rem; /* max-w-lg */
            margin: 0 auto;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background-color: #f8fafc; /* light slate */
        }
        
        .chat-bottom {
            shrink: 0;
            width: 100%;
            padding: 1rem;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 7rem;
        }

    </style>
</head>
<body>

    async function initAudioContext() {
        await Tone.start();
        correctSound = new Tone.Synth({ oscillator: { type: "sine" } }).toDestination();
        errorSound = new Tone.Synth({ oscillator: { type: "triangle" } }).toDestination();
        completionSynth = new Tone.PolySynth(Tone.Synth).toDestination();
        transitionSynth = new Tone.Synth({
            oscillator: { type: "sine" },
            envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
        }).toDestination();
        transitionSynth.volume.value = -15; 
    }

    function changePage(dir) {
        if (dir !== 0 && transitionSynth && currentPage > 0) {
            transitionSynth.triggerAttackRelease('C6', '0.05s');
        }

        if(currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }
        
        if (activeRecorder && activeRecorder.state === 'recording') {
            activeRecorder.stop();
            clearTimeout(recordingTimeout);
        }

        const oldPage = document.getElementById(`page-${currentPage}`);
        if(oldPage) oldPage.classList.remove('active');

        currentPage += dir;
        
        if(currentPage < 0) currentPage = 0;
        if(currentPage >= TOTAL_PAGES) currentPage = TOTAL_PAGES - 1;

        const newPage = document.getElementById(`page-${currentPage}`);
        if(newPage) newPage.classList.add('active');

        const percent = ((currentPage) / (TOTAL_PAGES - 1)) * 100;
        document.getElementById('progress-bar').style.width = `${percent}%`;
        
        if (currentPage === TOTAL_PAGES - 1) {
            if (completionSynth) completionSynth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "4n");
            window.parent.postMessage({ type: 'lesson_complete' }, '*');
        }
    }

    /* =========================================
       Chat Controller
    ========================================= */
    async function startChat() {
        await initAudioContext();
        changePage(1); // Move to Page 2
        setTimeout(() => {
            playTurn(1);
        }, 500);
    }

    function scrollChatToBottom() {
        const chatBox = document.getElementById('chat-box');
        setTimeout(() => {
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }, 50);
    }

    function addSeowonBubble(text) {
        const chatBox = document.getElementById('chat-box');
        const bubbleHTML = `
            <div class="flex w-full justify-start bubble-animate">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs mr-2 shrink-0 border border-indigo-200 mt-1">
                    서원
                </div>
                <div class="bg-white border border-slate-200 text-slate-800 p-3 sm:p-4 rounded-b-2xl rounded-tr-2xl text-sm sm:text-base shadow-sm max-w-[80%] text-left leading-relaxed">
                    ${text}
                </div>
            </div>
        `;
        chatBox.insertAdjacentHTML('beforeend', bubbleHTML);
        scrollChatToBottom();
    }

    function addUserBubble(text) {
        const chatBox = document.getElementById('chat-box');
        const bubbleHTML = `
            <div class="flex w-full justify-end bubble-animate">
                <div class="bg-indigo-600 text-white p-3 sm:p-4 rounded-b-2xl rounded-tl-2xl text-sm sm:text-base shadow-sm max-w-[80%] text-left leading-relaxed">
                    ${text}
                </div>
            </div>
        `;
        chatBox.insertAdjacentHTML('beforeend', bubbleHTML);
        scrollChatToBottom();
    }

    function addFeedbackBubble(fr_translation, explanation) {
        const chatBox = document.getElementById('chat-box');
        const bubbleHTML = `
            <div class="flex w-full justify-center bubble-animate my-1">
                <div class="bg-orange-50 border border-orange-200 text-orange-800 p-3 rounded-xl text-xs sm:text-sm shadow-sm w-[90%] text-left">
                    <p class="font-bold mb-1 border-b border-orange-200 pb-1">Traduction : ${fr_translation}</p>

    function enableMic() {
        const btn = document.getElementById('chat-mic-btn');
        const status = document.getElementById('chat-status');
        btn.disabled = false;
        btn.className = "bg-red-500 text-white rounded-full flex items-center justify-center w-16 h-16 shadow-xl transition-transform hover:scale-105 active:scale-95 cursor-pointer pointer-events-auto";
        btn.innerHTML = `<i class="ph-fill ph-microphone text-3xl"></i>`;
        status.innerText = "À vous de parler !";
        status.className = "text-indigo-600 font-bold text-sm leading-tight text-center mt-2 h-4";
    }

    function disableMicWait() {
        const btn = document.getElementById('chat-mic-btn');
        const status = document.getElementById('chat-status');
        btn.disabled = true;
        btn.className = "bg-slate-300 text-white rounded-full flex items-center justify-center w-16 h-16 shadow-none cursor-not-allowed pointer-events-none";
        status.innerText = "Écoutez Seowon...";
        status.className = "text-slate-500 font-medium text-sm leading-tight text-center mt-2 h-4";
    }

    function playTurn(id) {
        currentTurnId = id;
        turnAttempts = 0;
        const turnData = dialogueScript[id];
        
        disableMicWait();
        
        // Add Seowon's text bubble
        addSeowonBubble(turnData.text);
        
        // Play Audio
        if(currentAudio) { currentAudio.pause(); }
        currentAudio = new Audio(turnData.audio);
        
        currentAudio.onended = () => {
            if (id === 6) {
                // End of conversation
                document.getElementById('chat-mic-btn').classList.add('hidden');
                document.getElementById('chat-status').classList.add('hidden');
                document.getElementById('chat-finish-btn').classList.remove('hidden');
                if(correctSound) correctSound.triggerAttackRelease('C5', '0.2s');
            } else {
                enableMic();
                // 자동 재생(setTimeout) 부분 제거됨: 유저가 직접 마이크를 눌러야 시작함
            }
        };
        currentAudio.play().catch(e => {
            console.warn("Audio play error", e);
            // fallback if auto-play fails
            if (id !== 6) enableMic();
        });
    }

    /* =========================================
       Gemini Audio Recognition & Evaluation
    ========================================= */
    function pauseConversation() {
        // 1. 서원의 오디오가 재생 중이면 정지
        if (currentAudio && !currentAudio.paused) {
            currentAudio.pause();
            enableMic(); 
        }
        
        // 2. 녹음 중일 경우 녹음 강제 종료 및 파기(Discard)
        if (activeRecorder && activeRecorder.state === 'recording') {
            isDiscarding = true;
            activeRecorder.stop();
            clearTimeout(recordingTimeout);
            
            // UI 초기화
            const btn = document.getElementById('chat-mic-btn');
            btn.classList.remove('recording-pulse');
            btn.innerHTML = `<i class="ph-fill ph-microphone text-3xl"></i>`;
            
            const statusEl = document.getElementById('chat-status');
            statusEl.innerText = "Enregistrement annulé.";
            statusEl.className = "text-orange-500 font-bold text-sm leading-tight text-center mt-2 h-4";
            
            // 1.5초 후 다시 마이크 활성화
            setTimeout(() => {
                enableMic();
            }, 1500);
        }
    }

    async function toggleChatMic(btn) {
        const statusEl = document.getElementById('chat-status');
        
        if (btn.classList.contains('recording-pulse')) {
            if (activeRecorder && activeRecorder.state === 'recording') {
                isDiscarding = false; // 정상적인 종료 (API 전송 O)
                activeRecorder.stop();
                clearTimeout(recordingTimeout);
            }
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            let audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = async () => {
                // 일시정지 버튼으로 취소된 경우 백엔드로 전송하지 않고 종료
                if (isDiscarding) {
                    isDiscarding = false;
                    return; 
                }

                btn.classList.remove('recording-pulse');
                btn.innerHTML = `<i class="ph ph-spinner animate-spin text-3xl"></i>`;
                statusEl.innerText = "Analyse en cours...";
                statusEl.className = "text-slate-500 font-medium text-sm leading-tight text-center mt-2 h-4";
                
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const mimeType = audioBlob.type.split(';')[0] || 'audio/webm';
                
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    const base64data = reader.result.split(',')[1];
                    await processGeminiChat(base64data, mimeType);
                }
                
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            activeRecorder = mediaRecorder;
            btn.classList.add('recording-pulse');
            btn.innerHTML = `<i class="ph-fill ph-stop text-3xl"></i>`;
            statusEl.innerText = "Enregistrement...";
            statusEl.className = "text-red-500 font-bold text-sm leading-tight text-center mt-2 h-4 animate-pulse";

            // Max recording set to 11 seconds
            recordingTimeout = setTimeout(() => {
                if(mediaRecorder.state === 'recording') mediaRecorder.stop();
            }, 11000);

        } catch (err) {
            console.error("Mic access error:", err);
            statusEl.innerText = "Erreur de microphone.";
            statusEl.className = "text-red-500 font-bold text-sm leading-tight text-center mt-2 h-4";
            setTimeout(enableMic, 2000);
        }
    }

    async function processGeminiChat(audioBase64, mimeType) {
        turnAttempts++;
        const turnData = dialogueScript[currentTurnId];
        const sysPrompt = turnData.sysPrompt;
        
        let transcript = "";
        let evaluation = "";
        let isPass = false;

        const payload = {
            model: "gemini-2.5-flash",
            contents: [
                {
                    role: "user",
                    parts: [
                        { text: "Analyze the audio response." },
                        { 
                            inline_data: { 
                                mime_type: mimeType, 
                                data: audioBase64 
                            } 
                        }
                    ]
                }
            ],
            systemInstruction: sysPrompt // 백엔드 로직에 맞게 객체가 아닌 문자열(String)로 전송
        };

        try {
            const fetchPromise = fetch(`https://coreeno.base44.app/api/functions/Geminichat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const res = await fetchPromise;
            
            if (!res.ok) {
                throw new Error("API returned status: " + res.status);
            }
            
            const data = await res.json();
            // 백엔드가 반환하는 형태는 { text: aiText, raw: data } 임을 반영
            const resultText = data.text || "";
            
            // Extract using regex
            const tMatch = resultText.match(/\[전사\]\s*(.*?)\s*(?:\[평가\]|$)/si);
            const eMatch = resultText.match(/\[평가\]\s*(.*)/si);
            
            if (tMatch && tMatch[1]) transcript = tMatch[1].trim();
            if (eMatch && eMatch[1]) {
                evaluation = eMatch[1].trim();
                if (evaluation.includes('<Pass>')) isPass = true;
            }

            if (!transcript) transcript = "???";

        } catch (error) {
            console.warn("Gemini API Error.", error);
            transcript = "Audio non reconnu.";
            evaluation = "Erreur de connexion. Veuillez réessayer.";
            isPass = false;
        }

        // 1. Show User Bubble
        addUserBubble(transcript);

        // 2. Evaluate Pass or Fail
        let forcePass = turnAttempts >= 2;

        if (isPass || forcePass) {
            if(correctSound) correctSound.triggerAttackRelease('C5', '0.2s');
            const statusEl = document.getElementById('chat-status');
            statusEl.innerText = "Très bien !";
            statusEl.className = "text-green-600 font-bold text-sm leading-tight text-center mt-2 h-4";
            
            // Disable mic during transition
            disableMicWait();

            setTimeout(() => {
                // Logic for moving to next question
                let nextTurnId = currentTurnId + 1;
                
                // Special Branch Logic at Q3
                if (currentTurnId === 3) {
                    if (transcript.includes("요리")) {
                        nextTurnId = 5; // Go to Q5
                    } else {
                        nextTurnId = 4; // Go to Q4
                    }
                }
                
                playTurn(nextTurnId);

            }, 1500);

        } else {
            // Fail
            if(errorSound) errorSound.triggerAttackRelease('C4', '0.1s');
            
            // Clean explanation (remove <Pass> if accidentally there, etc.)
            let cleanEval = evaluation.replace('<Pass>', '').trim();
            if(!cleanEval) cleanEval = "Veuillez répéter votre réponse.";

            addFeedbackBubble(turnData.fr, cleanEval);
            
            // Allow retry
            setTimeout(() => {
                enableMic();
            }, 1000);
        }
    }

</script>
</body>
</html>
