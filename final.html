        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

        :root { --unit: 1vmin; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1f2937;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .korean-text { font-family: 'Noto Sans KR', sans-serif; }

        #app-container {
            background-color: white;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            width: 100%; height: 100%;
        }
        @media (min-width: 1024px) {
            #app-container {
                aspect-ratio: 16/9; width: auto; height: 100vh;
                max-width: 177.78vh;
                box-shadow: 0 0 50px rgba(0,0,0,0.5);
            }
            html { font-size: 2.5vh; }
        }
        @media (max-width: 1023px) {
            #app-container { width: 100%; height: 100%; }
            html { font-size: 16px; }
        }

        .page-wrapper {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: clamp(1vh,2vmin,3vh) clamp(2vw,4vmin,4vw);
            width: 100%; height: 100%; box-sizing: border-box; overflow: hidden;
        }
        .page-wrapper-writing {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;

            padding-top: clamp(7vh,10vmin,12vh);
            width: 100%; height: 100%; box-sizing: border-box; overflow: hidden;
        }

        .card-box {
            background: white; border: 1px solid #e5e7eb; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            padding: clamp(1rem,3vmin,2.5rem);
            width: 100%; max-width: 800px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; flex-shrink: 1; max-height: 100%;
        }

        .text-fluid-xl   { font-size: clamp(1.5rem,5vmin,4rem); }
        .text-fluid-lg   { font-size: clamp(1.2rem,3.5vmin,2.5rem); }
        .text-fluid-base { font-size: clamp(0.9rem,2.5vmin,1.5rem); }
        .text-fluid-sm   { font-size: clamp(0.8rem,2vmin,1.25rem); }
        .text-fluid-xs   { font-size: clamp(0.7rem,1.6vmin,1rem); }
        .icon-fluid-lg   { font-size: clamp(2rem,6vmin,5rem); }
        .icon-fluid-md   { font-size: clamp(1.5rem,4vmin,3rem); }

            width: 3.5rem; height: 3.5rem; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        @media (min-width: 1024px) { .nav-btn { width: 5rem; height: 5rem; } }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from{opacity:0;transform:scale(0.98);}to{opacity:1;transform:scale(1);} }

        .recording-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red {
            0%  {box-shadow:0 0 0 0 rgba(239,68,68,0.7);}
            70% {box-shadow:0 0 0 15px rgba(239,68,68,0);}
            100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}

            text-align: left; background: white;

        .write-input {
            width: 100%; max-width: 700px;
            border: 2px solid #e5e7eb; border-radius: 1rem;
            padding: clamp(0.6rem,1.8vmin,1.2rem) clamp(1rem,2.5vmin,2rem);
            font-family: 'Noto Sans KR', sans-serif;
            outline: none; text-align: center; background: white;

            font-size: clamp(0.9rem,2.5vmin,1.5rem);

        .write-input:focus { border-color:#6366f1; }

        .audio-play-btn {

            gap: clamp(0.4rem,1vmin,0.8rem);
            padding: clamp(0.6rem,1.5vmin,1.2rem) clamp(1.5rem,3vmin,2.5rem);

            border-radius:999px; color:#4338ca;

            font-size: clamp(0.8rem,2vmin,1.25rem);
        }
        .audio-play-btn:hover:not(:disabled){background:#e0e7ff;border-color:#6366f1;}
        .audio-play-btn:disabled{opacity:0.45;cursor:not-allowed;}

        #progress-bar-fill {
            height:100%;
            background:linear-gradient(90deg,#6366f1,#818cf8);
            border-radius:999px; transition:width 0.4s ease;
        }

        .timer-normal  { color:#6b7280; }
        .timer-warning { color:#f59e0b; }
        .timer-danger  { color:#ef4444; animation:blink 1s step-end infinite; }
        @keyframes blink{50%{opacity:0.4;}}

        .rec-btn-base {
            border-radius:50%; display:flex; align-items:center;
            justify-content:center; transition:all 0.2s;
        }
        .consigne-item {
            display:flex; align-items:flex-start;
            gap:clamp(0.5rem,1.5vmin,1rem); text-align:left;
        }
        .result-item {
            width:100%; max-width:700px;
            padding:clamp(0.5rem,1.5vmin,1rem) clamp(1rem,2vmin,1.5rem);
            border-radius:0.75rem; background:#f9fafb; border:1px solid #e5e7eb;
        }

        /* Q20 interview style */
        .interview-bubble {
            background:#eef2ff; border:2px solid #c7d2fe;
            border-radius:0 1.5rem 1.5rem 1.5rem;
            padding: clamp(1rem,2.5vmin,2rem) clamp(1.2rem,3vmin,2.5rem);
            max-width:600px; width:100%;
            display:flex; align-items:center; gap:clamp(0.8rem,2vmin,1.5rem);
        }

        .score-row{display:flex;align-items:center;justify-content:space-between;padding:clamp(0.4rem,1.2vmin,0.8rem) clamp(0.8rem,2vmin,1.2rem);border-radius:0.75rem;width:100%;max-width:700px;}
        .score-row-green{background:#f0fdf4;border:1px solid #bbf7d0;}
        .score-row-red{background:#fff1f2;border:1px solid #fecdd3;}
        .score-row-blue{background:#eff6ff;border:1px solid #bfdbfe;}
    </style>
</head>

{

    type:'writing', qNum:11,

{
    type:'mcq', qNum:12,
    instruction:"Quelle phrase contient une erreur ?",

const TOTAL_QUESTIONS = 20;
const MAX_SCORE       = 20;

// ─────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────
async function initAudio() {
    if (audioCtxInited) return;
    try {
        await Tone.start();
        completionSynth = new Tone.PolySynth(Tone.Synth).toDestination();
        completionSynth.volume.value = 4;
        pageTurnSynth   = new Tone.MembraneSynth({
            pitchDecay:0.008, octaves:1,
            oscillator:{type:'sine'},
            envelope:{attack:0.001,decay:0.1,sustain:0,release:0.1}
        }).toDestination();
        pageTurnSynth.volume.value = 6;
        correctSynth = new Tone.Synth({
            oscillator:{type:'triangle'},
            envelope:{attack:0.001,decay:0.15,sustain:0,release:0.1}
        }).toDestination();
        correctSynth.volume.value = 4;
        audioCtxInited = true;
    } catch(e){ console.warn("Audio init failed",e); }
}
function playSuccessSound(){ if(correctSynth) correctSynth.triggerAttackRelease("C5","16n"); }
function stopCurrentAudio(){
    if(autoPlayTimer){clearTimeout(autoPlayTimer);autoPlayTimer=null;}
    if(currentAudioObj){
        currentAudioObj.pause();currentAudioObj.currentTime=0;
        currentAudioObj.onended=null;currentAudioObj=null;
    }
}
function playAudio(src){
    stopCurrentAudio();if(!src)return;
    currentAudioObj=new Audio(src);
    const p=currentAudioObj.play();
    if(p!==undefined)p.catch(e=>{if(e.name!=='AbortError')console.error(e);});
}
function playPageTurnSound(){if(pageTurnSynth)pageTurnSynth.triggerAttackRelease("C2","32n");}

// ─────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────
function startTimer(){
    if(timerStarted)return;
    timerStarted=true;
    timerInterval=setInterval(()=>{
        timeRemaining--;
        updateTimerDisplay();
        if(timeRemaining<=0){clearInterval(timerInterval);forceFinish();}
    },1000);
}
function updateTimerDisplay(){
    const el=document.getElementById('timer-display');if(!el)return;
    const m=Math.floor(timeRemaining/60),s=timeRemaining%60;
    el.innerText=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className='font-mono font-bold text-fluid-xs bg-gray-100 px-3 py-1 rounded-full whitespace-nowrap flex-shrink-0 ';
    if(timeRemaining<=60)el.classList.add('timer-danger');
    else if(timeRemaining<=300)el.classList.add('timer-warning');
    else el.classList.add('timer-normal');
}
function forceFinish(){
    stopCurrentAudio();isRecording=false;
    currentPage=pages.length-1;renderPage();
}

function renderPage(){
    stopCurrentAudio();
    container.innerHTML='';
    const page=pages[currentPage];
    if(page.type==='cover'||page.type==='results'){
        header.classList.add('hidden');footer.classList.add('hidden');
    } else {
        header.classList.remove('hidden');footer.classList.remove('hidden');
        pageIndicator.innerText=`${page.qNum} / ${TOTAL_QUESTIONS}`;
        progressFill.style.width=`${((page.qNum-1)/TOTAL_QUESTIONS)*100}%`;
        updateTimerDisplay();
    }
    switch(page.type){
        case'cover':    renderCover();         break;
        case'mcq':      renderMCQ(page);       break;
        case'listening':renderListening(page); break;
        case'writing':  renderWriting(page);   break;
        case'speaking': renderSpeaking(page);  break;
        case'results':  renderResults();       break;
    }
}

function renderWriting(page){
    const saved=(pageAnswers[currentPage]||{});
    const savedVal=saved.userText||'';
    container.innerHTML=`
    <div class="page-wrapper-writing fade-in">
      <div class="flex flex-col items-center w-full gap-[2.5vh] max-w-[700px]">

        </div>
        <input id="write-input" class="write-input"
               type="text" inputmode="text"
               placeholder="한국어로 입력하세요"
               value="${savedVal.replace(/"/g,'&quot;')}"
               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
               oninput="onWriteInput(this.value)" />
        <div id="write-feedback" class="text-fluid-sm font-medium flex items-center justify-center"
             style="min-height:clamp(2.5vh,3.5vmin,4vh);"></div>
      </div>
    </div>`;
    if(savedVal.trim())enableNext();else disableNext();
    setTimeout(()=>{const inp=document.getElementById('write-input');if(inp)inp.focus();},300);
}
function onWriteInput(val){
    if(!pageAnswers[currentPage])pageAnswers[currentPage]={};
    pageAnswers[currentPage].userText=val;
    if(val.trim())enableNext();else disableNext();
}
function scoreWriting(page){
    if(!pageAnswers[currentPage])pageAnswers[currentPage]={};
    const ans=pageAnswers[currentPage];
    const raw=(ans.userText||'').trim();
    // 유저 입력에 올바르지 않은 문장부호가 있으면 즉시 0점
    // 허용: 마침표(.) 또는 없음. 불허: ?!,。！？등
    const hasInvalidPunct = /[!?,。！？]/.test(raw);
    if(hasInvalidPunct){ ans.score=0; ans.userText=raw; return; }
    // 정답 비교 시 마침표 제거 후 비교 (있어도/없어도 동일 취급)
    const norm=s=>s.replace(/[.。]/g,'').trim();
    const user=norm(raw);

    // Q14 special: subject present = 1pt, subject omitted = 0.5pt
    if(page.specialScoring==='q14'){
        for(const ref of page.fullAnswers){
            if(calcSimilarity(user,norm(ref))>=0.85){ans.score=1;ans.userText=raw;return;}
        }
        for(const ref of page.halfAnswers){
            if(calcSimilarity(user,norm(ref))>=0.85){ans.score=0.5;ans.userText=raw;return;}
        }
        ans.score=0;ans.userText=raw;return;
    }

    // Auto-expand acceptedAnswers with 입니다 variants
    const baseAnswers=(page.acceptedAnswers||[page.answer]);
    const expanded=[];
    baseAnswers.forEach(ref=>{
        expanded.push(ref);
        const rn=norm(ref);
        const r2=rn.replace(/예요$/,'입니다').replace(/이에요$/,'입니다');
        if(r2!==rn)expanded.push(r2);
    });
    let best=0;
    expanded.forEach(ref=>{
        const sim=calcSimilarity(user,norm(ref));
        if(sim>best)best=sim;
    });
    ans.score=best>=0.7?best:0;
    ans.userText=raw;
}
function calcSimilarity(a,b){
    if(a===b)return 1;if(!a||!b)return 0;
    const la=a.length,lb=b.length;
    const dp=Array.from({length:la+1},(_,i)=>Array.from({length:lb+1},(_,j)=>i===0?j:j===0?i:0));
    for(let i=1;i<=la;i++)for(let j=1;j<=lb;j++)
        dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return 1-dp[la][lb]/Math.max(la,lb);
}

// ── Clova recording ───────────────────────────
function setupClovaRecording(page){
    const btn=document.getElementById('rec-btn');
    const fb=document.getElementById('speak-feedback');
    if(!pageAnswers[currentPage])pageAnswers[currentPage]={attemptsUsed:0};
    const state=pageAnswers[currentPage];

    btn.onclick=async()=>{
        if(isRecording){clearTimeout(recordingTimeout);stopSpeakRecording(btn,fb);return;}
        if(state.attemptsUsed>=page.maxAttempts){return;}
        try{
            await initAudio();
            const stream=await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRecorder=new MediaRecorder(stream);
            audioChunks=[];
            mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
            mediaRecorder.onstop=async()=>{
                const blob=new Blob(audioChunks,{type:'audio/webm'});
                const reader=new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend=async()=>{
                    const b64=reader.result.split(',')[1];
                    state.attemptsUsed=(state.attemptsUsed||0)+1;
                    const attLeft=page.maxAttempts-state.attemptsUsed;
                    if(attLeft<=0)btn.disabled=true;
                    fb.innerHTML=`<span class="text-indigo-400">Analyse en cours…</span>`;
                    await processClovaSpeech(b64,page.referenceTexts,fb,page,btn);
                };
                stream.getTracks().forEach(t=>t.stop());
            };
            mediaRecorder.start();isRecording=true;
            btn.classList.add('recording-pulse','bg-red-500','text-white','border-red-500');
            btn.classList.remove('bg-white','text-indigo-600','border-gray-100');
            btn.innerHTML=`<i class="ph ph-stop icon-fluid-md"></i>`;
            fb.innerHTML=`<span class="text-red-500 font-bold">Enregistrement…</span>`;
            recordingTimeout=setTimeout(()=>{if(isRecording)stopSpeakRecording(btn,fb);},6000);
        }catch(err){
            console.error(err);
            fb.innerHTML=`<span class="text-red-400">Accès au micro refusé.</span>`;
        }
    };
}

function stopSpeakRecording(btn,fb){
    if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
    clearTimeout(recordingTimeout);isRecording=false;
    btn.classList.remove('recording-pulse','bg-red-500','text-white','border-red-500');
    btn.classList.add('bg-white','text-indigo-600','border-gray-100');
    btn.innerHTML=`<i class="ph ph-microphone icon-fluid-lg"></i>`;
}

async function processClovaSpeech(b64,referenceTexts,fbEl,page,btnEl){
    try{
        const res=await fetch(CLOVA_API_URL,{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({audioBase64:b64,languageCode:"Kor",assessment:false})
        });
        if(!res.ok)throw new Error("API Error");
        const data=await res.json();
        const recognized=(data.text||'').trim();
        const norm=s=>s.replace(/[.!?,。！？]/g,'').trim();
        let best=0;
        (referenceTexts||[]).forEach(ref=>{
            const sim=calcSimilarity(norm(recognized),norm(ref));
            if(sim>best)best=sim;
        });
        // Tiered scoring: <60%=0, 60-80%=0.5, 80-90%=0.7, >=90%=1
        let tierScore=0;
        if(best>=0.9)tierScore=1;
        else if(best>=0.8)tierScore=0.7;
        else if(best>=0.6)tierScore=0.5;

        if(!pageAnswers[currentPage])pageAnswers[currentPage]={};
        const state=pageAnswers[currentPage];
        const attLeft=page.maxAttempts-(state.attemptsUsed||0);

        if(tierScore>0){
            state.score=tierScore;state.submitted=true;
            btnEl.disabled=true;
            btnEl.innerHTML=`<i class="ph ph-check icon-fluid-md text-green-500"></i>`;
            fbEl.innerHTML=`<span class="text-green-500 font-bold">Enregistrement reçu ✓</span>`;
            playSuccessSound();
            enableNext();
        } else if(attLeft<=0){
            state.score=0;state.submitted=true;
            fbEl.innerHTML=`<span class="text-orange-400">Essais épuisés.</span>`;
            enableNext();
        } else {
            fbEl.innerHTML=`<span class="text-orange-400">Réessayez. (${attLeft} essai${attLeft>1?'s':''} restant${attLeft>1?'s':''})</span>`;
            btnEl.disabled=false;
        }
    }catch(e){
        console.error(e);
        if(!pageAnswers[currentPage])pageAnswers[currentPage]={};
        pageAnswers[currentPage].score=0;pageAnswers[currentPage].submitted=true;
        fbEl.innerHTML=`<span class="text-orange-400">Erreur serveur.</span>`;
        enableNext();
    }
}

// ── Gemini recording ──────────────────────────
const GEMINI_SYSTEM_INSTRUCTION=
    "다음 발화가 \"직업이 뭐예요?\"에 대한 정답으로 적절한 한국어 문장인지 평가하고 0-1의 숫자로만 회신한다. 완벽한 답이면 1, 내용을 이해할 수 있지만 문법 오류가 있거나 단어가 명확하지 않은 경우 0.5, 질문에 대한 적절한 답이 아닌 경우 0에 해당한다.";

function setupGeminiRecording(page){
    const btn=document.getElementById('rec-btn');
    const fb=document.getElementById('speak-feedback');

    btn.onclick=async()=>{
        if(isRecording){clearTimeout(recordingTimeout);stopSpeakRecording(btn,fb);return;}
        try{
            await initAudio();
            const stream=await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRecorder=new MediaRecorder(stream);
            audioChunks=[];
            mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
            mediaRecorder.onstop=async()=>{
                const blob=new Blob(audioChunks,{type:'audio/webm'});
                stream.getTracks().forEach(t=>t.stop());
                btn.disabled=true;
                fb.innerHTML=`<span class="text-indigo-400">Analyse en cours…</span>`;
                await processGeminiSpeech(blob,fb);
            };
            mediaRecorder.start();isRecording=true;
            btn.classList.add('recording-pulse','bg-red-500','text-white','border-red-500');
            btn.classList.remove('bg-white','text-indigo-600','border-gray-100');
            btn.innerHTML=`<i class="ph ph-stop icon-fluid-md"></i>`;
            fb.innerHTML=`<span class="text-red-500 font-bold">Enregistrement…</span>`;
            recordingTimeout=setTimeout(()=>{if(isRecording)stopSpeakRecording(btn,fb);},6000);
        }catch(err){
            console.error(err);
            fb.innerHTML=`<span class="text-red-400">Accès au micro refusé.</span>`;
        }
    };
}

async function processGeminiSpeech(blob,fbEl){
    try{
        const reader=new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend=async()=>{
            const base64data=reader.result.split(',')[1];
            const mimeType=blob.type?blob.type.split(';')[0]:'audio/webm';
            try{
                const res=await fetch(GEMINI_API_URL,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        contents:[{role:"user",parts:[{inlineData:{mimeType,data:base64data}}]}],
                        systemInstruction:GEMINI_SYSTEM_INSTRUCTION,
                        model:"gemini-2.5-flash"
                    })
                });
                if(!res.ok)throw new Error(`API ${res.status}`);
                const result=await res.json();
                const rawText=(result.text||'').trim();
                const score=parseFloat(rawText.replace(/[^0-9.]/g,''))||0;
                if(!pageAnswers[currentPage])pageAnswers[currentPage]={};
                pageAnswers[currentPage].score=Math.min(1,Math.max(0,score));
                pageAnswers[currentPage].submitted=true;
                fbEl.innerHTML=`<span class="text-green-500 font-bold">Enregistrement reçu ✓</span>`;
                enableNext();
            }catch(apiErr){
                console.error("Gemini API Error",apiErr);
                if(!pageAnswers[currentPage])pageAnswers[currentPage]={};
                pageAnswers[currentPage].score=0;pageAnswers[currentPage].submitted=true;
                fbEl.innerHTML=`<span class="text-orange-400">Erreur serveur.</span>`;
                enableNext();
            }
        };
    }catch(err){
        console.error(err);
        if(!pageAnswers[currentPage])pageAnswers[currentPage]={};
        pageAnswers[currentPage].score=0;pageAnswers[currentPage].submitted=true;
        fbEl.innerHTML=`<span class="text-orange-400">Erreur de traitement.</span>`;
        enableNext();
    }
}

// ─────────────────────────────────────────────
// RESULTS — per-question score rows
// ─────────────────────────────────────────────
function renderResults(){
    clearInterval(timerInterval);
    footer.classList.add('hidden');header.classList.add('hidden');

    let total=0;
    const questionPages=pages.slice(1,TOTAL_QUESTIONS+1);
    questionPages.forEach((_,i)=>{total+=((pageAnswers[i+1]||{}).score||0);});
    total=Math.round(total*10)/10;
    const pct=total/MAX_SCORE;
    const grade=pct>=0.9?"Excellent !":pct>=0.75?"Très bien !":pct>=0.6?"Assez bien.":"À revoir.";
    const scoreColor=pct>=0.8?'text-green-600':pct>=0.6?'text-indigo-600':'text-orange-500';

    const typeLabel=t=>t==='mcq'?'QCM':t==='listening'?'Écoute':t==='writing'?'Écriture':'Expression orale';

    const rowsHtml=questionPages.map((p,i)=>{
        const sc=Math.round(((pageAnswers[i+1]||{}).score||0)*100)/100;
        const isGreen=sc>=1;
        const isBlue=sc>0&&sc<1;
        const rowCls=isGreen?'score-row-green':isBlue?'score-row-blue':'score-row-red';
        const iconCls=isGreen?'ph-check-circle text-green-500':isBlue?'ph-minus-circle text-blue-500':'ph-x-circle text-red-400';
        const scoreTxtCls=isGreen?'text-green-600 font-bold':isBlue?'text-blue-600 font-bold':'text-red-500 font-bold';
        const scoreTxt=isGreen?'1 / 1':isBlue?`${sc} / 1`:'0 / 1';
        return `
        <div class="score-row ${rowCls}">
          <div class="flex items-center gap-[1.5vmin]">
            <i class="ph ${iconCls}" style="font-size:clamp(1rem,2.2vmin,1.6rem);flex-shrink:0;"></i>
            <span class="text-fluid-xs text-gray-600 font-semibold">Q${p.qNum}<span class="font-normal text-gray-400"> — ${typeLabel(p.type)}</span></span>
          </div>
          <span class="text-fluid-xs ${scoreTxtCls}">${scoreTxt}</span>
        </div>`;
    }).join('');

    container.innerHTML=`
    <div class="page-wrapper fade-in">
      <div class="flex flex-col items-center w-full gap-[2vh] max-w-[700px]" style="height:100%;justify-content:center;">
        <div class="flex flex-col items-center gap-[0.8vh]">
          <div style="width:clamp(10vh,14vmin,14vh);height:clamp(10vh,14vmin,14vh);background:#eef2ff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 8px rgba(0,0,0,0.08);">
            <span class="text-fluid-xl font-black ${scoreColor}">${total}</span>
            <span class="text-fluid-xs text-gray-400 font-semibold">/ ${MAX_SCORE}</span>
          </div>
          <span class="text-fluid-lg font-bold text-gray-700">${grade}</span>
        </div>
        <div class="w-full flex flex-col gap-[0.8vh]" style="overflow-y:auto;max-height:52vh;">
          ${rowsHtml}
        </div>
        <button onclick="restartTest()" class="px-[4vw] py-[1.5vh] bg-indigo-600 text-white rounded-full font-bold text-fluid-sm hover:bg-indigo-700 transition">
          Recommencer le test
        </button>
      </div>
    </div>`;

    initAudio().then(()=>{
        if(completionSynth)completionSynth.triggerAttackRelease(["C5","E5","G5","C6"],"4n");
        if(window.parent){
            window.parent.postMessage({type:'test_complete',score:total,maxScore:MAX_SCORE},'*');
            window.parent.postMessage('lessonCompleted','*');
        }
    });
}

function restartTest(){
    Object.keys(pageAnswers).forEach(k=>delete pageAnswers[k]);
    clearInterval(timerInterval);
    timeRemaining=EXAM_DURATION_SEC;timerStarted=false;
    currentPage=0;isRecording=false;
    renderPage();
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function nextPage(){
    if(!audioCtxInited)initAudio();
    playPageTurnSound();
    const page=pages[currentPage];
    if(page.type==='mcq')      scoreMCQ(page);
    if(page.type==='listening')scoreListening(page);
    if(page.type==='writing')  scoreWriting(page);
    if(currentPage<pages.length-1){currentPage++;renderPage();}
}
btnNext.addEventListener('click',nextPage);

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderPage();
</script>
